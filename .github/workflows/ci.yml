name: HRM CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ===== Job 1: Unit Test Backend =====
  unit-test:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy code từ kho lưu trữ (Checkout code)
      uses: actions/checkout@v3

    - name: Cài đặt môi trường Node.js (Setup Node.js)
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Cài đặt các thư viện Backend (Install Dependencies)
      run: npm install
      working-directory: ./backend

    - name: Chạy Unit Test Backend (Run Tests)
      run: npm test
      working-directory: ./backend

  # ===== Job 2: E2E Test Frontend =====
  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: hr_management
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Cài đặt thư viện Backend
      run: npm install
      working-directory: ./backend

    - name: Cài đặt thư viện Frontend
      run: npm install
      working-directory: ./frontend

    - name: Cài đặt Playwright Browsers
      run: npx playwright install chromium --with-deps
      working-directory: ./frontend

    - name: Tạo dữ liệu mẫu (Seed Database)
      run: node seed.js
      working-directory: ./backend
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: ci_password
        DB_NAME: hr_management
        JWT_SECRET: ci_test_secret
        JWT_EXPIRES_IN: 8h

    - name: Chạy E2E Tests (Playwright)
      run: npx playwright test
      working-directory: ./frontend
      env:
        CI: true
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: ci_password
        DB_NAME: hr_management
        JWT_SECRET: ci_test_secret
        JWT_EXPIRES_IN: 8h
        PORT: 5000

    - name: Upload test report nếu lỗi
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/test-results/

  # ==========================================================
  # Job 3: CD – Triển khai Backend lên Render
  # ==========================================================
  # Render cung cấp Deploy Hook URL để kích hoạt deploy từ bên ngoài.
  # Chỉ chạy khi push vào main (không chạy với Pull Request).
  # Cần tạo secret RENDER_DEPLOY_HOOK_URL trên GitHub repo.
  deploy-backend:
    runs-on: ubuntu-latest
    needs: e2e-test                       # Chỉ deploy khi test pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: 🚀 Triển khai Backend lên Render
      run: |
        echo "Đang gửi yêu cầu deploy tới Render..."
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        echo "✅ Đã gửi yêu cầu deploy Backend thành công!"

  # ==========================================================
  # Job 4: CD – Triển khai Frontend lên Vercel
  # ==========================================================
  # Sử dụng Vercel CLI để build và deploy trực tiếp.
  # Cần tạo 3 secrets trên GitHub repo:
  #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: e2e-test                       # Chỉ deploy khi test pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Lấy code từ kho lưu trữ
      uses: actions/checkout@v3

    - name: Cài đặt Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Cài đặt Vercel CLI
      run: npm install -g vercel

    - name: 🚀 Triển khai Frontend lên Vercel (Production)
      run: |
        echo "Đang deploy Frontend lên Vercel..."
        vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
      working-directory: ./frontend
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
