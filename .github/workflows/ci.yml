name: HRM CI Pipeline (Kiểm thử tự động)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ===== Job 1: Unit Test Backend =====
  unit-test:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy code từ kho lưu trữ
      uses: actions/checkout@v4

    - name: Cài đặt môi trường Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cài đặt các thư viện Backend
      run: npm install
      working-directory: ./backend

    - name: Chạy Unit Test Backend
      run: npm test
      working-directory: ./backend

  # ===== Job 2: E2E Test Frontend =====
  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: hr_management
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ci_password
      DB_NAME: hr_management
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 8h
      PORT: 5000

    steps:
    - name: Lấy code từ kho lưu trữ
      uses: actions/checkout@v4

    - name: Cài đặt môi trường Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cài đặt thư viện Backend
      run: npm install
      working-directory: ./backend

    - name: Cài đặt thư viện Frontend
      run: npm install
      working-directory: ./frontend

    - name: Cài đặt Playwright Browsers
      run: npx playwright install chromium --with-deps
      working-directory: ./frontend

    - name: Tạo dữ liệu mẫu (Seed Database)
      run: node seed.js
      working-directory: ./backend

    - name: Khởi động Backend Server
      run: node server.js &
      working-directory: ./backend

    - name: Khởi động Frontend Dev Server
      run: npm run dev &
      working-directory: ./frontend

    - name: Chờ cả 2 server sẵn sàng
      run: |
        echo "Đợi Backend (port 5000)..."
        timeout 30 bash -c 'until curl -sf http://localhost:5000 > /dev/null 2>&1; do sleep 1; done'
        echo "✅ Backend sẵn sàng!"
        echo "Đợi Frontend (port 3000)..."
        timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 1; done'
        echo "✅ Frontend sẵn sàng!"
        sleep 3
        echo "✅ Sẵn sàng chạy E2E test!"

    - name: Chạy E2E Tests (Playwright)
      run: npx playwright test
      working-directory: ./frontend
      env:
        CI: true

    - name: Upload test report nếu lỗi
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/test-results/
